{% extends "base.html" %}

{% block title %}Mapa Energético{% endblock %}

{% block content %}

<h1 style="text-align:center;">🌎 Mapa de Energía Renovable en Colombia</h1>

<div id="map"></div>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  // Crear mapa centrado en Colombia
  const map = L.map('map').setView([4.5709, -74.2973], 6);

  // Cargar mapa base
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  // Datos de energías en Colombia
  const energias = [
    {
      nombre: "Parque Solar La Guajira",
      coords: [11.5444, -72.9072],
      tipo: "Solar ☀️"
    },
    {
      nombre: "Parque Eólico Jepírachi",
      coords: [12.3, -71.9],
      tipo: "Eólica 💨"
    },
    {
      nombre: "Central Hidroeléctrica Guatapé",
      coords: [6.234, -75.163],
      tipo: "Hidráulica 💧"
    }
  ];

  // Agregar marcadores
  energias.forEach(e => {
    L.marker(e.coords)
      .addTo(map)
      .bindPopup(`<b>${e.nombre}</b><br>${e.tipo}`);
  });
</script>

<style>
#map {
  height: 500px;
  margin: 30px;
  border-radius: 15px;
}
</style>

{% endblock %}
